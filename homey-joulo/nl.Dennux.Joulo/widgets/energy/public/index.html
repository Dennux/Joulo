<!DOCTYPE html>
<html lang="nl">

<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>Joulo Energy</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="widget">

    <h2 class="section-title">
    Totaaloverzicht
</h2>

    <!-- Totals ---------------------------------------------------------->

    <section class="totals">
       

        <div class="total-card">

       

            <div class="total-title">
                Energie
            </div>

            <div
                id="total-kwh"
                class="total-value">

                --

            </div>

         
        </div>

        <div class="total-card">

            <div class="total-title">
                ERE Credits
            </div>

            <div
                id="total-credits"
                class="total-value">

                --

            </div>


        </div>

        <div class="total-card">

            <div class="total-title">
                Sessies
            </div>

            <div
                id="total-sessions"
                class="total-value">

                --

            </div>

        </div>

    </section>

    <!-- Chart ----------------------------------------------------------->

    <section class="chart-section">

        <canvas id="energy-chart"></canvas>

    </section>

    <h2 class="section-title">
    Maandoverzicht
</h2>
    <!-- Month selector -------------------------------------------------->

    <section class="month-selector">

        <button
            id="previous-month"
            class="nav-button"
            type="button">

            &#10094;

        </button>

        <div
            id="selected-month"
            class="selected-month">

            --

        </div>

        <button
            id="next-month"
            class="nav-button"
            type="button">

            &#10095;

        </button>

    </section>

    <!-- Month details --------------------------------------------------->

    <section class="month-details">

        <div class="detail-row">

            <span class="detail-label">

                ⚡ Energie

            </span>

            <span id="month-kwh">

                --

            </span>

        </div>

        <div class="detail-row">

            <span class="detail-label">

                🪙 ERE Credits

            </span>

            <span id="month-credits">

                --

            </span>

        </div>

        <div class="detail-row">

            <span class="detail-label">

                🚗 Sessies

            </span>

            <span id="month-sessions">

                --

            </span>

        </div>

    </section>

</div>

<script src="chart.umd.min.js"></script>

<script src="helpers.js"></script>
<script src="chart.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>

</body>

</html>
